<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JCO Smart - Central de Controle Residencial</title>
    <style>
        :root {
            --bg-primary: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --card-bg: #2a2a2a;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --on-color: #00ff88;
            --off-color: #ff4444;
            --border: #404040;
            --hover: #3a3a3a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg-primary); 
            color: var(--text-primary); 
            overflow: hidden;
            height: 100vh;
        }
        .app { display: flex; height: 100vh; }
        .sidebar {
            width: 250px; min-width: 200px; background: var(--bg-secondary);
            padding: 20px 0; border-right: 1px solid var(--border);
        }
        .nav-item {
            display: flex; align-items: center; padding: 15px 20px;
            cursor: pointer; transition: background 0.2s;
            font-size: 16px; font-weight: 500;
        }
        .nav-item:hover { background: var(--hover); }
        .nav-item.active { background: var(--card-bg); border-right: 3px solid var(--on-color); }
        .nav-icon { width: 20px; height: 20px; margin-right: 15px; background: var(--text-secondary); border-radius: 3px; }
        .main { flex: 1; padding: 20px; overflow-y: auto; }
        .header { font-size: 28px; font-weight: 600; margin-bottom: 30px; }
        .status { 
            background: var(--card-bg); padding: 20px; border-radius: 12px;
            margin-bottom: 30px; border: 1px solid var(--border);
        }
        .status-text { font-size: 20px; margin-bottom: 10px; }
        .status-count { color: var(--on-color); font-weight: 600; }
        .devices-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .device-card {
            background: var(--card-bg); padding: 25px; border-radius: 12px; border: 1px solid var(--border);
            cursor: pointer; transition: all 0.2s; text-align: center;
        }
        .device-card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,255,136,0.1); }
        .device-name { font-size: 20px; font-weight: 600; margin-bottom: 15px; }
        .device-status { font-size: 14px; color: var(--text-secondary); margin-bottom: 20px; }
        .toggle-btn {
            width: 80px; height: 40px; border-radius: 20px; border: none; cursor: pointer;
            font-size: 12px; font-weight: 600; transition: all 0.2s; position: relative;
        }
        .toggle-on { background: var(--on-color); color: #000; }
        .toggle-off { background: var(--off-color); color: #fff; }
        .toggle-slider { 
            position: absolute; top: 2px; left: 2px; width: 36px; height: 36px; 
            background: #fff; border-radius: 50%; transition: transform 0.2s;
        }
        .toggle-on .toggle-slider { transform: translateX(40px); }
        .cameras-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .camera-card {
            background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid var(--border);
            cursor: pointer; transition: all 0.2s;
        }
        .camera-card:hover { transform: scale(1.02); }
        .camera-name { padding: 15px 20px; font-size: 18px; font-weight: 500; background: rgba(0,0,0,0.3); }
        .camera-video {
            width: 100%; height: 200px; background: linear-gradient(45deg, #333, #444);
            display: flex; align-items: center; justify-content: center; color: var(--text-secondary);
            font-size: 14px;
        }
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-video { width: 90%; max-width: 800px; height: 70%; background: #000; border-radius: 8px; }
        .close-modal { position: absolute; top: 20px; right: 30px; font-size: 30px; cursor: pointer; color: #fff; }
        .placeholder { text-align: center; color: var(--text-secondary); padding: 40px; }
        @media (max-width: 768px) {
            .sidebar { width: 70px; }
            .nav-item span { display: none; }
            .main { padding: 10px; }
            .devices-grid, .cameras-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="app">
        <nav class="sidebar">
            <div class="nav-item active" data-page="dashboard">
                <div class="nav-icon"></div><span>Dashboard</span>
            </div>
            <div class="nav-item" data-page="devices">
                <div class="nav-icon" style="background: var(--on-color);"></div><span>Dispositivos</span>
            </div>
            <div class="nav-item" data-page="cameras">
                <div class="nav-icon" style="background: linear-gradient(45deg, #00f, #00f);"></div><span>Câmeras</span>
            </div>
            <div class="nav-item" data-page="automations">
                <div class="nav-icon"></div><span>Automações</span>
            </div>
        </nav>
        <main class="main">
            <!-- Dashboard -->
            <div id="dashboard" class="page active">
                <h1 class="header">Dashboard</h1>
                <div class="status">
                    <div class="status-text">Status da Casa</div>
                    <div id="status-count" class="status-count">2 dispositivos ativos</div>
                </div>
                <div class="devices-grid" id="dashboard-devices"></div>
            </div>
            <!-- Dispositivos -->
            <div id="devices" class="page">
                <h1 class="header">Dispositivos</h1>
                <div class="devices-grid" id="devices-list"></div>
            </div>
            <!-- Câmeras -->
            <div id="cameras" class="page">
                <h1 class="header">Câmeras</h1>
                <div class="cameras-grid" id="cameras-grid"></div>
            </div>
            <!-- Automações -->
            <div id="automations" class="page">
                <h1 class="header">Automações</h1>
                <div class="placeholder">Em breve: configurações automáticas inteligentes para sua casa.</div>
            </div>
        </main>
    </div>
    <div id="camera-modal" class="modal">
        <span class="close-modal">&times;</span>
        <div class="modal-video" id="modal-video"></div>
    </div>

    <script>
        // Dados dos dispositivos (preparado para API IoT - ex: Tuya/Smart Life)
        let devices = [
            {id: 1, name: 'Luz da Sala', status: 'off', room: 'Sala'},
            {id: 2, name: 'Luz da Cozinha', status: 'on', room: 'Cozinha'},
            {id: 3, name: 'Tomada da TV', status: 'off', room: 'Sala'},
            {id: 4, name: 'Ar Condicionado', status: 'on', room: 'Quarto'},
            {id: 5, name: 'Ventilador', status: 'off', room: 'Cozinha'}
        ];
        let cameras = [
            {id: 1, name: 'Entrada Principal', stream: 'placeholder'},
            {id: 2, name: 'Garagem', stream: 'placeholder'},
            {id: 3, name: 'Sala', stream: 'placeholder'},
            {id: 4, name: 'Cozinha', stream: 'placeholder'}
        ];

        // Função para toggle (simulação local - futura: fetch('/api/device/' + id))
        function toggleDevice(id) {
            const device = devices.find(d => d.id === id);
            if (device) {
                device.status = device.status === 'on' ? 'off' : 'on';
                updateStatus();
                renderDevices();
                renderDashboardDevices();
            }
        }

        // Atualiza status da casa
        function updateStatus() {
            const active = devices.filter(d => d.status === 'on').length;
            document.getElementById('status-count').textContent = `${active} dispositivos ativos`;
        }

        // Renderiza cards de dispositivos
        function renderDevices() {
            const container = document.getElementById('devices-list');
            container.innerHTML = devices.map(device => `
                <div class="device-card" onclick="toggleDevice(${device.id})">
                    <div class="device-name">${device.name}</div>
                    <div class="device-status">${device.room}</div>
                    <button class="toggle-btn ${device.status === 'on' ? 'toggle-on' : 'toggle-off'}">
                        <div class="toggle-slider"></div>
                        ${device.status.toUpperCase()}
                    </button>
                </div>
            `).join('');
        }

        // Renderiza dispositivos no dashboard (cards menores)
        function renderDashboardDevices() {
            const container = document.getElementById('dashboard-devices');
            container.innerHTML = devices.map(device => `
                <div class="device-card" onclick="toggleDevice(${device.id})">
                    <div class="device-name">${device.name}</div>
                    <button class="toggle-btn ${device.status === 'on' ? 'toggle-on' : 'toggle-off'}">
                        <div class="toggle-slider"></div>
                    </button>
                </div>
            `).join('');
        }

        // Renderiza câmeras
        function renderCameras() {
            const container = document.getElementById('cameras-grid');
            container.innerHTML = cameras.map(camera => `
                <div class="camera-card" onclick="openCamera(${camera.id})">
                    <div class="camera-name">${camera.name}</div>
                    <div class="camera-video">Vídeo ao vivo<br>(Clique para expandir)</div>
                </div>
            `).join('');
        }

        // Abre câmera em modal (futura: src = apiStreamUrl)
        function openCamera(id) {
            const camera = cameras.find(c => c.id === id);
            document.getElementById('modal-video').innerHTML = `
                <div style="width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center;color:#666;font-size:24px;">
                    ${camera.name} - Stream ao vivo<br>
                    <small>Preparado para RTSP/ONVIF (ex: Yoose/Tuya)</small>
                </div>
            `;
            document.getElementById('camera-modal').classList.add('active');
        }

        // Navegação
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelector('.nav-item.active').classList.remove('active');
                item.classList.add('active');
                document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
                document.getElementById(item.dataset.page).classList.add('active');
            });
        });

        // Modal close
        document.querySelector('.close-modal').addEventListener('click', () => {
            document.getElementById('camera-modal').classList.remove('active');
        });
        document.getElementById('camera-modal').addEventListener('click', e => {
            if (e.target === e.currentTarget) document.getElementById('camera-modal').classList.remove('active');
        });

        // Inicializa
        updateStatus();
        renderDevices();
        renderDashboardDevices();
        renderCameras();
    </script>
</body>
</html>
