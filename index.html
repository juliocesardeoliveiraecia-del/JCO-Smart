<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JCO Smart</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0f14;
    color: white;
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 230px;
    background: #11161d;
    height: 100vh;
    padding: 20px;
}

.logo {
    font-size: 20px;
    margin-bottom: 20px;
}

.logo span {
    color: orange;
}

.menu div {
    padding: 12px;
    margin: 8px 0;
    cursor: pointer;
}

.menu div:hover {
    background: #1c2430;
}

/* MAIN */
.main {
    flex: 1;
    padding: 20px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 15px;
}

.card {
    background: #151b23;
    padding: 15px;
    border-radius: 10px;
}

button {
    width: 100%;
    padding: 10px;
    border: none;
    cursor: pointer;
    border-radius: 6px;
}

.on { background: #1ecb7b; }
.off { background: #ff4d4d; }

/* CAMERAS */
.camera {
    background: #151b23;
    border-radius: 10px;
    overflow: hidden;
}

.camera img {
    width: 100%;
}

/* MODAL */
.modal {
    position: fixed;
    background: rgba(0,0,0,0.7);
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: #151b23;
    padding: 20px;
    border-radius: 10px;
    width: 300px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}

</style>
</head>

<body>

<div class="sidebar">
    <div class="logo">JCO <span>Smart</span></div>

    <div class="menu">
        <div onclick="show('dashboard')">Dashboard</div>
        <div onclick="show('devices')">Dispositivos</div>
        <div onclick="show('cameras')">Câmeras</div>
        <div onclick="show('settings')">Configurações</div>
    </div>
</div>

<div class="main">

    <!-- DASHBOARD -->
    <div id="dashboard">
        <h2>Dashboard</h2>
        <div class="grid" id="deviceGrid"></div>
    </div>

    <!-- DEVICES -->
    <div id="devices" style="display:none;">
        <h2>Dispositivos</h2>
        <button onclick="openModal('device')">+ Adicionar Dispositivo</button>
        <div class="grid" id="deviceList"></div>
    </div>

    <!-- CAMERAS -->
    <div id="cameras" style="display:none;">
        <h2>Câmeras</h2>
        <button onclick="openModal('camera')">+ Adicionar Câmera</button>
        <div class="grid" id="cameraList"></div>
    </div>

    <!-- SETTINGS -->
    <div id="settings" style="display:none;">
        <h2>Configurações</h2>
        <p>JCO Smart v1.0</p>
    </div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">
        <h3 id="modalTitle"></h3>
        <input id="name" placeholder="Nome">
        <input id="url" placeholder="URL da câmera (opcional)">
        <button onclick="save()">Salvar</button>
    </div>
</div>

<script>

let devices = JSON.parse(localStorage.getItem("devices")) || [];
let cameras = JSON.parse(localStorage.getItem("cameras")) || [];

let currentType = "";

function show(section){
    ["dashboard","devices","cameras","settings"].forEach(s=>{
        document.getElementById(s).style.display="none";
    });
    document.getElementById(section).style.display="block";
}

function openModal(type){
    currentType = type;
    document.getElementById("modal").style.display="flex";
    document.getElementById("modalTitle").innerText =
        type === "device" ? "Novo Dispositivo" : "Nova Câmera";
}

function save(){
    const name = document.getElementById("name").value;
    const url = document.getElementById("url").value;

    if(currentType === "device"){
        devices.push({id: Date.now(), name, status:false});
        localStorage.setItem("devices", JSON.stringify(devices));
    } else {
        cameras.push({id: Date.now(), name, url});
        localStorage.setItem("cameras", JSON.stringify(cameras));
    }

    document.getElementById("modal").style.display="none";
    render();
}

function toggle(id){
    let d = devices.find(x=>x.id===id);
    d.status = !d.status;
    localStorage.setItem("devices", JSON.stringify(devices));
    render();
}

function render(){

    // DASHBOARD
    let grid = document.getElementById("deviceGrid");
    grid.innerHTML = "";

    devices.forEach(d=>{
        grid.innerHTML += `
            <div class="card">
                <h3>${d.name}</h3>
                <button class="${d.status?'on':'off'}" onclick="toggle(${d.id})">
                    ${d.status?'ON':'OFF'}
                </button>
            </div>
        `;
    });

    // DEVICES
    let list = document.getElementById("deviceList");
    list.innerHTML = grid.innerHTML;

    // CAMERAS
    let camList = document.getElementById("cameraList");
    camList.innerHTML = "";

    cameras.forEach(c=>{
        camList.innerHTML += `
            <div class="camera">
                <img src="${c.url || 'https://placehold.co/400x250'}">
                <div style="padding:10px">${c.name}</div>
            </div>
        `;
    });

}

render();

</script>

</body>
</html>
